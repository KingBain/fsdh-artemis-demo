name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

  schedule:
    # Rebuild once per hour, off the top of the hour
    - cron: "17 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Databricks scoped access token
        id: databricks_token
        shell: bash
        env:
          INSTANCE_URL: ${{ vars.DATABRICKS_INSTANCE_URL }}
          WORKSPACE_ID: ${{ vars.DATABRICKS_WORKSPACE_ID }}
          DASHBOARD_ID: ${{ vars.DATABRICKS_DASHBOARD_ID }}
          SERVICE_PRINCIPAL_ID: ${{ vars.DATABRICKS_SERVICE_PRINCIPAL_ID }}
          SERVICE_PRINCIPAL_SECRET: ${{ secrets.DATABRICKS_SERVICE_PRINCIPAL_SECRET }}
          EXTERNAL_VIEWER_ID: ${{ vars.DATABRICKS_EXTERNAL_VIEWER_ID }}
          EXTERNAL_VALUE: ${{ vars.DATABRICKS_EXTERNAL_VALUE }}
        run: |
          set -euo pipefail

          basic_auth="$(printf '%s:%s' "$SERVICE_PRINCIPAL_ID" "$SERVICE_PRINCIPAL_SECRET" | base64 -w 0)"

          echo "Requesting Databricks all-apis token..."
          oidc_response="$(
            curl -fsS \
              -X POST "${INSTANCE_URL}/oidc/v1/token" \
              -H "Authorization: Basic ${basic_auth}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "scope=all-apis"
          )"

          oidc_token="$(echo "$oidc_response" | jq -r '.access_token')"

          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "Failed to get Databricks OIDC token"
            echo "$oidc_response"
            exit 1
          fi

          echo "::add-mask::$oidc_token"

          echo "Requesting dashboard tokeninfo..."
          tokeninfo_response="$(
            curl -fsS \
              "${INSTANCE_URL}/api/2.0/lakeview/dashboards/${DASHBOARD_ID}/published/tokeninfo?external_viewer_id=${EXTERNAL_VIEWER_ID}&external_value=${EXTERNAL_VALUE}" \
              -H "Authorization: Bearer ${oidc_token}"
          )"

          authorization_details="$(echo "$tokeninfo_response" | jq -c '.authorization_details')"

          if [ -z "$authorization_details" ] || [ "$authorization_details" = "null" ]; then
            echo "Failed to get tokeninfo authorization_details"
            echo "$tokeninfo_response"
            exit 1
          fi

          echo "Requesting Databricks scoped token..."
          scoped_response="$(
            curl -fsS \
              -X POST "${INSTANCE_URL}/oidc/v1/token" \
              -H "Authorization: Basic ${basic_auth}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "authorization_details=${authorization_details}" \
              --data-urlencode "audience=$(echo "$tokeninfo_response" | jq -r '.audience')" \
              --data-urlencode "subject_token_type=$(echo "$tokeninfo_response" | jq -r '.subject_token_type')" \
              --data-urlencode "subject_token=$(echo "$tokeninfo_response" | jq -r '.subject_token')" \
              --data-urlencode "actor_token_type=$(echo "$tokeninfo_response" | jq -r '.actor_token_type')" \
              --data-urlencode "actor_token=$(echo "$tokeninfo_response" | jq -r '.actor_token')"
          )"

          scoped_token="$(echo "$scoped_response" | jq -r '.access_token')"

          if [ -z "$scoped_token" ] || [ "$scoped_token" = "null" ]; then
            echo "Failed to get Databricks scoped token"
            echo "$scoped_response"
            exit 1
          fi

          echo "::add-mask::$scoped_token"

          {
            echo "DATABRICKS_SCOPED_TOKEN=$scoped_token"
            echo "DATABRICKS_INSTANCE_URL=$INSTANCE_URL"
            echo "DATABRICKS_WORKSPACE_ID=$WORKSPACE_ID"
            echo "DATABRICKS_DASHBOARD_ID=$DASHBOARD_ID"
          } >> "$GITHUB_ENV"

      - name: Inject Databricks token into static page
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import os

          index_path = Path("index.html")
          html = index_path.read_text(encoding="utf-8")

          replacements = {
              "__DATABRICKS_INSTANCE_URL__": os.environ["DATABRICKS_INSTANCE_URL"],
              "__DATABRICKS_WORKSPACE_ID__": os.environ["DATABRICKS_WORKSPACE_ID"],
              "__DATABRICKS_DASHBOARD_ID__": os.environ["DATABRICKS_DASHBOARD_ID"],
              "__DATABRICKS_TOKEN__": os.environ["DATABRICKS_SCOPED_TOKEN"],
          }

          for old, new in replacements.items():
              html = html.replace(old, new)

          index_path.write_text(html, encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
