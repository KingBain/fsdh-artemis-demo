name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update README.md from mission-data.json
        shell: python
        run: |
          import json
          from pathlib import Path

          mission_data_path = Path("data/mission-data.json")
          if not mission_data_path.exists():
              raise FileNotFoundError(f"Missing required file: {mission_data_path}")

          mission_data = json.loads(mission_data_path.read_text(encoding="utf-8"))

          mission = mission_data.get("mission", {})
          metadata = mission_data.get("metadata", {})
          generated_at_utc = mission_data.get("generated_at_utc", "N/A")

          latest_epoch_utc = mission.get("latest_epoch_utc", "N/A")
          latest_speed_km_h = mission.get("latest_speed_km_h", "N/A")
          state_vector_count = mission.get("state_vector_count", "N/A")
          mission_duration_hours = mission.get("mission_duration_hours", "N/A")

          def fmt_float(value, digits):
              try:
                  return f"{float(value):.{digits}f}"
              except (TypeError, ValueError):
                  return "N/A"

          readme_content = f"""# fsdh-artemis-demo

          Artemis II mission overview generated from Databricks using a prototype FSDH pipeline.

          ## Mission Summary
          - **Latest Orion timestamp:** {latest_epoch_utc}
          - **Latest speed:** {fmt_float(latest_speed_km_h, 1)} km/h
          - **State vector count:** {state_vector_count}
          - **Mission duration:** {fmt_float(mission_duration_hours, 2)} hours

          ## Mission Metadata
          - **Object name:** {metadata.get('object_name', 'N/A')}
          - **Object ID:** {metadata.get('object_id', 'N/A')}
          - **Center name:** {metadata.get('center_name', 'N/A')}
          - **Reference frame:** {metadata.get('reference_frame', 'N/A')}
          - **Time system:** {metadata.get('time_system', 'N/A')}
          - **Start time:** {metadata.get('start_time', 'N/A')}
          - **Stop time:** {metadata.get('stop_time', 'N/A')}

          ## Trajectory Analytics
          Interactive charts are rendered on the website using Chart.js and mission data exported from Databricks.

          ## Website
          [View the live site](https://kingbain.github.io/fsdh-artemis-demo/)

          ## Notes
          - The website renders charts from JSON data instead of static chart images.
          - README metrics are generated from `data/mission-data.json`.
          - Site data generated at: {generated_at_utc}
          """

          Path("README.md").write_text(readme_content.strip() + "\n", encoding="utf-8")

      - name: Commit and push README.md
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No README changes to commit."
          else
            git commit -m "docs: auto-update README.md from mission data"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
