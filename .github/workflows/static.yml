name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Rebuild twice per hour to prevent token expiration gaps (tokens expire in 1hr)
    - cron: "15 * * * *"
    - cron: "45 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Token and Inject HTML
        env:
          INSTANCE_URL: ${{ vars.DATABRICKS_INSTANCE_URL }}
          WORKSPACE_ID: ${{ vars.DATABRICKS_WORKSPACE_ID }}
          DASHBOARD_ID: ${{ vars.DATABRICKS_DASHBOARD_ID }}
          SERVICE_PRINCIPAL_ID: ${{ vars.DATABRICKS_SERVICE_PRINCIPAL_ID }}
          SERVICE_PRINCIPAL_SECRET: ${{ secrets.DATABRICKS_SERVICE_PRINCIPAL_SECRET }}
          EXTERNAL_VIEWER_ID: ${{ vars.DATABRICKS_EXTERNAL_VIEWER_ID }}
          EXTERNAL_VALUE: ${{ vars.DATABRICKS_EXTERNAL_VALUE }}
        run: node build.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5