name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Rebuild twice per hour to prevent token expiration gaps (tokens expire in 1hr)
    - cron: "15 * * * *"
    - cron: "45 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Update README.md with flight data and graphs
        shell: python
        run: |
          import re
          from pathlib import Path

          # Read the HTML to extract the latest metrics
          html = Path("index.html").read_text(encoding="utf-8")

          def get_metric(label):
              # Fixed f-string interpolation and added \s* to handle any formatting spaces
              pattern = f'<div class="metric-label">\\s*{re.escape(label)}\\s*</div>\\s*<div class="metric-value">\\s*([^<]+?)\\s*</div>'
              match = re.search(pattern, html, re.IGNORECASE)
              return match.group(1).strip() if match else "N/A"

          timestamp = get_metric("Latest Orion timestamp")
          speed = get_metric("Latest speed (km/s)")
          vectors = get_metric("State vector count")
          duration = get_metric("Mission duration (hours)")

          # Construct the new README content
          readme_content = f"""# fsdh-artemis-demo

          Artemis II mission overview generated from Databricks using a prototype FSDH pipeline.

          ## 🚀 Mission Summary
          - **Latest Orion timestamp:** {timestamp}
          - **Latest speed:** {speed} km/s
          - **State vector count:** {vectors}
          - **Mission duration:** {duration} hours

          ## 📈 Trajectory Analytics

          ### Orion Speed Over Time
          ![Orion Speed Over Time](assets/orion-speed-over-time.png)

          ### Orion Distance Over Time
          ![Orion Distance Over Time](assets/orion-distance-over-time.png)

          ### Summary Values
          ![Orion Summary Card](assets/orion-summary-card.png)
          """

          Path("README.md").write_text(readme_content, encoding="utf-8")

      - name: Commit and push README.md
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit and push if the README actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update README.md with flight data and graphs" && git push)

      - name: Generate Databricks scoped access token
        id: databricks_token
        shell: bash
        env:
          INSTANCE_URL: ${{ vars.DATABRICKS_INSTANCE_URL }}
          WORKSPACE_ID: ${{ vars.DATABRICKS_WORKSPACE_ID }}
          DASHBOARD_ID: ${{ vars.DATABRICKS_DASHBOARD_ID }}
          SERVICE_PRINCIPAL_ID: ${{ vars.DATABRICKS_SERVICE_PRINCIPAL_ID }}
          SERVICE_PRINCIPAL_SECRET: ${{ secrets.DATABRICKS_SERVICE_PRINCIPAL_SECRET }}
          EXTERNAL_VIEWER_ID: ${{ vars.DATABRICKS_EXTERNAL_VIEWER_ID }}
          EXTERNAL_VALUE: ${{ vars.DATABRICKS_EXTERNAL_VALUE }}
        run: |
          set -euo pipefail

          INSTANCE_URL="${INSTANCE_URL%/}"

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          basic_auth="$(printf '%s:%s' "$SERVICE_PRINCIPAL_ID" "$SERVICE_PRINCIPAL_SECRET" | base64 | tr -d '\n')"

          echo "Requesting Databricks all-apis token..."
          oidc_response="$(
            curl -sS \
              -X POST "${INSTANCE_URL}/oidc/v1/token" \
              -H "Authorization: Basic ${basic_auth}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "scope=all-apis"
          )"

          oidc_token="$(echo "$oidc_response" | jq -r '.access_token')"

          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "Failed to get Databricks all-apis token"
            echo "$oidc_response"
            exit 1
          fi

          echo "::add-mask::$oidc_token"
          echo "All-apis token acquired."

          echo "Requesting dashboard tokeninfo..."
          tokeninfo_response="$(
            curl -sS -G \
              "${INSTANCE_URL}/api/2.0/lakeview/dashboards/${DASHBOARD_ID}/published/tokeninfo" \
              -H "Authorization: Bearer ${oidc_token}" \
              --data-urlencode "external_viewer_id=${EXTERNAL_VIEWER_ID}" \
              --data-urlencode "external_value=${EXTERNAL_VALUE}"
          )"

          authorization_details="$(echo "$tokeninfo_response" | jq -c '.authorization_details')"

          if [ -z "$authorization_details" ] || [ "$authorization_details" = "null" ]; then
            echo "Failed to get tokeninfo authorization_details"
            echo "$tokeninfo_response"
            exit 1
          fi

          params_json="$(echo "$tokeninfo_response" | jq -c 'del(.authorization_details) | with_entries(select(.value != null))')"

          # Safely encode arrays by repeating the key (e.g. resource=1&resource=2)
          form_body="$(
            jq -rn \
              --argjson params "$params_json" \
              --arg authorization_details "$authorization_details" '
                ($params + {
                  grant_type: "client_credentials",
                  authorization_details: $authorization_details
                })
                | to_entries
                | map(
                    .key as $k
                    | if (.value | type) == "array" then
                        (.value | map("\($k|@uri)=\(.|tostring|@uri)") | join("&"))
                      else
                        "\($k|@uri)=\(.value|tostring|@uri)"
                      end
                  )
                | join("&")
              '
          )"

          scoped_headers="$tmp_dir/scoped_headers.txt"
          scoped_body="$tmp_dir/scoped_body.txt"

          echo "Requesting Databricks scoped token..."
          scoped_http_code="$(
            curl -sS \
              -D "$scoped_headers" \
              -o "$scoped_body" \
              -w "%{http_code}" \
              -X POST "${INSTANCE_URL}/oidc/v1/token" \
              -H "Authorization: Basic ${basic_auth}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data "$form_body" \
              || true
          )"

          if [ "$scoped_http_code" != "200" ]; then
            echo "Scoped token request failed with HTTP $scoped_http_code."
            cat "$scoped_body"
            exit 1
          fi

          scoped_response="$(cat "$scoped_body")"
          scoped_token="$(echo "$scoped_response" | jq -r '.access_token')"

          if [ -z "$scoped_token" ] || [ "$scoped_token" = "null" ]; then
            echo "Scoped token response did not contain access_token"
            echo "$scoped_response"
            exit 1
          fi

          echo "::add-mask::$scoped_token"

          {
            echo "DATABRICKS_SCOPED_TOKEN=$scoped_token"
            echo "DATABRICKS_INSTANCE_URL=$INSTANCE_URL"
            echo "DATABRICKS_WORKSPACE_ID=$WORKSPACE_ID"
            echo "DATABRICKS_DASHBOARD_ID=$DASHBOARD_ID"
          } >> "$GITHUB_ENV"

          echo "Scoped token generated successfully."

      - name: Inject Databricks token into static page
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import os

          index_path = Path("index.html")
          html = index_path.read_text(encoding="utf-8")

          replacements = {
              "__DATABRICKS_INSTANCE_URL__": os.environ["DATABRICKS_INSTANCE_URL"],
              "__DATABRICKS_WORKSPACE_ID__": os.environ["DATABRICKS_WORKSPACE_ID"],
              "__DATABRICKS_DASHBOARD_ID__": os.environ["DATABRICKS_DASHBOARD_ID"],
              "__DATABRICKS_TOKEN__": os.environ["DATABRICKS_SCOPED_TOKEN"],
          }

          for old, new in replacements.items():
              html = html.replace(old, new)

          index_path.write_text(html, encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
